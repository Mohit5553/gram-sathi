version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: gramsathi_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backend/backups:/backups
    environment:
      - MONGO_INITDB_DATABASE=gramsathi

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: gramsathi_backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/gramsathi
      - JWT_SECRET=${JWT_SECRET:-fallback_secret_for_local_dev}
      - FRONTEND_URL=http://localhost:80
    volumes:
      - ./backend/logs:/usr/src/app/logs
      - ./backend/backups:/usr/src/app/backups

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gramsathi_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
